# Deployment da Payments API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: fiap-cloud-games
  labels:
    app: payments-api
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fiap-cloud-games
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payments-api
        app.kubernetes.io/name: payments-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: fiap-cloud-games
    spec:
      containers:
        - name: payments-api
          image: fiap-payments-api:latest
          imagePullPolicy: Never  # Para imagens locais (Docker Desktop)
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            # Carrega configurações não sensíveis do ConfigMap
            - configMapRef:
                name: payments-api-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
            # Carrega dados sensíveis do Secret
            - secretRef:
                name: payments-api-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      # Aguardar o RabbitMQ estar disponível
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo "Aguardando RabbitMQ..."; sleep 2; done; echo "RabbitMQ disponível!"']