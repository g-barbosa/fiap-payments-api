# Secrets para a Payments API
# IMPORTANTE: Armazena dados SENSÍVEIS (connection strings, chaves de API, senhas)
# Em produção, use um gerenciador de secrets externo!
apiVersion: v1
kind: Secret
metadata:
  name: payments-api-secrets
  namespace: fiap-cloud-games
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fiap-cloud-games
type: Opaque
stringData:
  # RabbitMQ - Credenciais
  RabbitMq__Username: "admin"
  RabbitMq__Password: "rabbitmq123"
  
  # Configurações de Email/SMS (exemplo)
  # Email__ApiKey: "sua-api-key-aqui"
  # Sms__ApiKey: "sua-api-key-aqui"